[build]
  publish = "."
  # No build command — this is a pre-built static mirror

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Gatsby uses trailing-slash URLs — ensure they resolve correctly
[[redirects]]
  from = "/about"
  to = "/about/"
  status = 301

